<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Void Protocol</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0d0a1f;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        cursor: none;
      }

      canvas { cursor: none; }

      #game-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #ui-root {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 1280px;
        height: 720px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
